name: NPM Lockfile Changes

on:
  pull_request:
    branches:
      - main
    paths:
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  lockfile_changes:
    runs-on: ubuntu-latest

    # Permission overwrite is required for Dependabot PRs
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: NPM Lockfile Changes
        uses: codepunkt/npm-lockfile-changes@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
